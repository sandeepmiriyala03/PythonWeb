<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PythonWeb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2d3748;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 48px 56px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 480px;
            width: 90%;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a202c;
        }
        p {
            font-size: 1.05rem;
            color: #718096;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            margin-top: 24px;
            padding: 6px 16px;
            background: #ebf8ff;
            color: #2b6cb0;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🐍</div>
        <h1>PythonWeb</h1>
        <p>Your Python web app is up and running. Start editing <code>main.py</code> to build something great.</p>
        <span class="badge">Flask · Python 3.11</span>
    </div>
</body>
</html>
